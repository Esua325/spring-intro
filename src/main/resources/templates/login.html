<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Aptech Student Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-card h1 {
            text-align: center;
            color: #0f3460;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .login-card p.subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-error { background: #fdf0ef; color: #c0392b; border-left: 4px solid #e74c3c; }
        .alert-success { background: #eafaf1; color: #1e8449; border-left: 4px solid #27ae60; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #0f3460; }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: #1a4a8a; }
        .hint {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
        }
        .hint strong { color: #0f3460; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎓 Aptech Portal</h1>
        <p class="subtitle">Student Management System</p>

        <div class="alert alert-error" th:if="${param.error}">
            ❌ Incorrect username or password. Please try again.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            ✅ You have been logged out successfully.
        </div>

        <form method="post" th:action="@{/login}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>

            <button type="submit">Login →</button>
        </form>

        <div class="hint">
            <strong>Student:</strong> student / student123<br>
            <strong>Admin:</strong> admin / admin123
        </div>
    </div>
</body>
</html>
