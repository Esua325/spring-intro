server.port=${PORT:8080}

# H2 In-Memory Database (local development - no MySQL needed)
spring.datasource.url=jdbc:h2:mem:student_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (view your data at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Course Service URL
course.service.url=${COURSE_SERVICE_URL:http://localhost:8082}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Thymeleaf
spring.thymeleaf.cache=false
